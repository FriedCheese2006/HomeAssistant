automation:
  - id: '123'
    alias: UE Sensor Update
    description: ''
    trigger:
    - platform: state
      entity_id:
      - binary_sensor.ue_has_new_order
      from: 'off'
      to: 'on'
      id: orderOn
    - platform: state
      entity_id:
      - binary_sensor.ue_has_new_order
      from: 'on'
      to: 'off'
      id: orderOff
      for:
        hours: 0
        minutes: 2
        seconds: 0
    condition: []
    action:
    - choose:
      - conditions:
        - condition: trigger
          id:
          - orderOn
        sequence:
        - service: automation.turn_on
          data: {}
          target:
            entity_id: automation.ue_order_in_progress
      - conditions:
        - condition: trigger
          id:
          - orderOff
        sequence:
        - service: automation.turn_off
          data:
            stop_actions: true
          target:
            entity_id: automation.ue_order_in_progress
  - id: '456'
    alias: UE Order In Progress
    description: ''
    trigger:
    - platform: time_pattern
      seconds: '30'
    condition: []
    action:
    - service: homeassistant.update_entity
      metadata: {}
      data: {}
      target:
        entity_id: sensor.ue_order_json
    mode: single
  - id: '789'
    alias: UE Phases
    description: ""
    trigger:
      - platform: state
        entity_id:
          - sensor.ue_status_desc
        to: Almost here!
        id: arriving
      - platform: state
        entity_id:
          - sensor.ue_status_desc
        to: Heading your way…
        id: enroute
      - platform: state
        entity_id:
          - sensor.ue_status_desc
        to: 
          - Preparing your order…
          - Picking up your order…
        id: ordered
    condition: []
    action:
      - choose:
          - conditions:
              - condition: trigger
                id:
                  - ordered
            sequence:
              - service: input_boolean.turn_on
                metadata: {}
                data: {}
                target:
                  entity_id: input_boolean.ue_ordered
          - conditions:
              - condition: trigger
                id:
                  - enroute
            sequence:
              - service: input_boolean.turn_on
                metadata: {}
                data: {}
                target:
                  entity_id: input_boolean.ue_otw
          - conditions:
              - condition: trigger
                id:
                  - arriving
            sequence:
              - service: input_boolean.turn_on
                metadata: {}
                data: {}
                target:
                  entity_id: input_boolean.ue_arrived
    mode: single
  - id: '1011'
    alias: UE Phases Reset
    description: ""
    trigger:
      - platform: state
        entity_id:
          - sensor.ue_order_count
        to: "No Orders"
        id: done
        for:
          hours: 0
          minutes: 5
          seconds: 0 
    condition: []
    action:
      - service: input_boolean.turn_off
        data: {}
        target:
          entity_id:
            - input_boolean.ue_ordered
            - input_boolean.ue_otw
            - input_boolean.ue_arrived
    mode: single

sensor:
  - platform: rest
    unique_id: ue_order_count
    name: UE Order Count
    resource: https://www.ubereats.com/api/getActiveOrdersV1
    method: POST
    headers:
      Content-Type: application/json
      X-CSRF-Token: x
      Cookie: !secret uberCookie
    payload: '{"timezone":"America/New_York"}'
    force_update: true
    value_template: >
      {% if value_json.data.orders | count == 0 %}
        {{ "No Orders" }}
      {% else %}
        {{ value_json.data.orders | count }}
      {% endif %}
    scan_interval: 60
  - platform: rest
    unique_id: ue_order_json
    name: UE Order JSON
    json_attributes:
      - feedCards
      - activeOrderOverview
      - contacts
      - backgroundFeedCards
    json_attributes_path: "$.data.orders[0]"
    resource: https://www.ubereats.com/api/getActiveOrdersV1
    method: POST
    headers:
      Content-Type: application/json
      X-CSRF-Token: x
      Cookie: !secret uberCookie
    payload: '{"timezone":"America/New_York"}'
    force_update: true
    value_template: >-
      {% if not is_state('sensor.ue_order_count',['Unknown','Unavailable','No Orders']) %}
        {{ value_json.data.orders[0].feedCards[0].status.currentProgress }}
      {% else %}
        {{ 'No Orders' }}
      {% endif %}
    scan_interval: 86400

template:
  - sensor:
    - unique_id: ue_status_desc
      default_entity_id: sensor.ue_status_desc
      name: UE Order Status
      state: '{{ state_attr("sensor.ue_order_json", "feedCards")[0].status.titleSummary.summary.text
        if not is_state("sensor.ue_order_json",[''Unknown'',''Unavailable'',''No Orders''])
        else "No Orders" }}'
  - sensor:
    - unique_id: ue_eta
      name: UE ETA
      state: >
        {% if states("sensor.ue_order_json") not in ["Unknown","Unavailable","No Orders"] %}
          {% set time_str = state_attr("sensor.ue_order_json", "feedCards")[0].status.title %}
          {% set parts = time_str.split(' - ') %}
          {% set end_time = parts[-1] %}
          {% set today = now().date() %}
          {% set today_str = today.strftime("%Y-%m-%d") %}
          {% set datetime_str = today_str + " " + end_time %}
          {% set timestamp = strptime(datetime_str, "%Y-%m-%d %I:%M %p") %}
          {{ timestamp }}
        {% else %}
          No Orders
        {% endif %}
  - sensor:
      - unique_id: ue_latest_arrival
        name: UE Latest Arrival
        state: >
          {% if states("sensor.ue_order_json") not in ["Unknown","Unavailable","No Orders"] %}
            {% if state_attr("sensor.ue_order_json", "feedCards")[0].status.statusSummary.text %}
              {% set time_str = state_attr("sensor.ue_order_json", "feedCards")[0].status.statusSummary.text.replace("Latest arrival by ", "") %}
              {% set today = now().date() %}
              {% set today_str = today.strftime("%Y-%m-%d") %}
              {% set datetime_str = today_str + " " + time_str %}
              {% set timestamp = strptime(datetime_str, "%Y-%m-%d %I:%M %p") %}
              {{ timestamp }}
            {% else %}
              No Time Set
            {% endif %}
          {% else %}
            No Orders
          {% endif %}
  - sensor:
      - unique_id: ue_courier_info
        name: UE Courier Info
        state: >
          {% if states("sensor.ue_order_json") not in ["Unknown","Unavailable","No Orders"] %}
            {% if state_attr("sensor.ue_order_json", "contacts") %}
              {{ state_attr("sensor.ue_order_json", "contacts")[0].title }}
            {% else %}
              No Driver Assigned
            {% endif %}
          {% else %}
            No Orders
          {% endif %}
        attributes:
          latitude: >
            {% if states("sensor.ue_order_json") not in ["Unknown","Unavailable","No Orders"]
                  and state_attr("sensor.ue_order_json", "backgroundFeedCards")
                  and state_attr("sensor.ue_order_json", "backgroundFeedCards")[0].mapEntity %}
              {{ state_attr("sensor.ue_order_json", "backgroundFeedCards")[0].mapEntity[0].latitude | float }}
            {% else %}
              none
            {% endif %}
          longitude: >
            {% if states("sensor.ue_order_json") not in ["Unknown","Unavailable","No Orders"]
                  and state_attr("sensor.ue_order_json", "backgroundFeedCards")
                  and state_attr("sensor.ue_order_json", "backgroundFeedCards")[0].mapEntity %}
              {{ state_attr("sensor.ue_order_json", "backgroundFeedCards")[0].mapEntity[0].longitude | float }}
            {% else %}
              none
            {% endif %}
  - sensor:
      - unique_id: ue_restaurant_name
        name: UE Restaurant Name
        state: >
          {% if states("sensor.ue_order_json") not in ["Unknown","Unavailable","No Orders"]
                and state_attr("sensor.ue_order_json", "activeOrderOverview") %}
            {{ state_attr("sensor.ue_order_json", "activeOrderOverview").title }}
          {% else %}
            No Orders
          {% endif %}

binary_sensor:
  - platform: template
    sensors:
      ue_has_new_order:
        friendly_name: "UE has a new order"
        unique_id: ue_has_new_order
        value_template: >
          {% set orders_count = states("sensor.ue_order_count") | int(0) %}
          {{ orders_count != ['unknown','No Orders'] and orders_count > 0 }}

input_boolean:
  ue_ordered:
    name: UE Order Submitted
    icon: mdi:food-fork-drink
  ue_otw:
    name: UE Order OTW
    icon: mdi:food-fork-drink
  ue_arrived:
    name: UE Order Arrived
    icon: mdi:food-fork-drink
